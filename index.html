<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Krankmeldung">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Krankmeldung – TWBI Gruppe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e3a5f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-block;
      background: #e85d26;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active {
      transform: scale(0.96);
      opacity: 0.85;
    }
    .hint {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      opacity: 0.5;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="logo">🤒</div>
  <h1>Krankmeldung</h1>
  <p class="subtitle">TWBI Gruppe</p>
  <a class="btn" href="https://forms.cloud.microsoft/e/pWAEiaeCa1" target="_blank" rel="noopener">
    Krankmeldung einreichen
  </a>
  <p class="hint">HR &amp; Vorgesetzte werden automatisch benachrichtigt.</p>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
